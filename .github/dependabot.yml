version: 2
updates:
  # GitHub Actions used by workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm packages used by the admin Express server (deployed to Render)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
      - "server"
    commit-message:
      prefix: "chore(server-deps)"
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
