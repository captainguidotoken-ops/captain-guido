<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Chapter — Captain Guido</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Chapter page overrides ── */
    body { overflow-x: hidden; }

    /* Nav back bar */
    .chapter-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(2, 12, 27, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.12);
    }
    .chapter-nav-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 2px;
      transition: color 0.2s;
    }
    .chapter-nav-left:hover { color: var(--aqua); }
    .chapter-nav-left svg { flex-shrink: 0; }
    .chapter-nav-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-display);
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--text-primary);
    }
    .chapter-nav-brand img { border-radius: 50%; }

    /* Hero */
    .chapter-hero {
      padding: 120px 2rem 60px;
      max-width: 760px;
      margin: 0 auto;
      text-align: left;
    }
    .chapter-num-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: var(--aqua);
      opacity: 0.7;
      margin-bottom: 1rem;
    }
    .chapter-hero-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #c0dff5 60%, #00aadd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      line-height: 1.15;
    }
    .chapter-setting-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .chapter-setting-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--text-secondary);
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 4px;
      padding: 0.3rem 0.75rem;
    }
    .chapter-setting-pill .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--aqua);
    }
    .chapter-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, var(--aqua), transparent);
      margin: 2rem 0;
      opacity: 0.5;
    }

    /* Body text */
    .chapter-body {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }
    .chapter-body p {
      font-family: var(--font-body, 'Inter', sans-serif);
      font-size: 1.1rem;
      line-height: 1.9;
      color: rgba(200, 218, 240, 0.88);
      margin-bottom: 1.4rem;
    }
    .chapter-body p:first-child::first-letter {
      font-size: 3.2rem;
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 0.8;
      float: left;
      margin: 0.1em 0.1em 0 0;
      color: var(--aqua);
    }
    /* Inline ledger entry style */
    .chapter-ledger-entry {
      font-family: var(--font-mono) !important;
      font-size: 0.8rem !important;
      letter-spacing: 2px;
      color: var(--aqua) !important;
      background: rgba(0, 212, 255, 0.06);
      border-left: 2px solid var(--aqua);
      padding: 0.6rem 1rem !important;
      margin: 2rem 0 !important;
    }
    .chapter-ledger-entry::first-letter { all: unset; }

    /* Prev / Next */
    .chapter-pagination {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-top: 1px solid rgba(0, 212, 255, 0.1);
      padding-top: 2.5rem;
    }
    .chapter-page-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: var(--text-secondary);
      text-decoration: none;
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 6px;
      padding: 0.7rem 1.2rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .chapter-page-btn:hover:not([disabled]) {
      color: var(--aqua);
      border-color: rgba(0, 212, 255, 0.4);
      background: rgba(0, 212, 255, 0.08);
    }
    .chapter-page-btn[disabled] {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }
    .chapter-back-voyage {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .chapter-back-voyage:hover { color: var(--aqua); }

    /* Loading / error states */
    #chapter-loading, #chapter-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: var(--text-secondary);
    }
    #chapter-error a {
      color: var(--aqua);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="chapter-nav">
    <a href="index.html#journey" class="chapter-nav-left" aria-label="Back to voyage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      BACK TO VOYAGE
    </a>
    <a href="index.html" class="chapter-nav-brand">
      <img src="captain-guido.png" alt="Captain Guido" width="32" height="32">
      CAPTAIN GUIDO
    </a>
  </nav>

  <!-- Content injected by JS -->
  <main id="chapter-main">
    <div id="chapter-loading">
      <span>LOADING CHAPTER...</span>
    </div>
    <div id="chapter-error" style="display:none;">
      <span>CHAPTER NOT FOUND</span>
      <a href="index.html#journey">← RETURN TO VOYAGE LOG</a>
    </div>
    <div id="chapter-content" style="display:none;">
      <header class="chapter-hero">
        <div class="chapter-num-label" id="ch-num-label"></div>
        <h1 class="chapter-hero-title" id="ch-title"></h1>
        <div class="chapter-setting-row">
          <span class="chapter-setting-pill"><span class="dot"></span><span id="ch-location"></span></span>
          <span class="chapter-setting-pill"><span class="dot" style="background:var(--gold-accent)"></span><span id="ch-setting"></span></span>
        </div>
        <div class="chapter-divider"></div>
      </header>
      <article class="chapter-body" id="ch-body"></article>
      <nav class="chapter-pagination" aria-label="Chapter navigation">
        <a class="chapter-page-btn" id="ch-prev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          PREV CHAPTER
        </a>
        <a href="index.html#journey" class="chapter-back-voyage">VOYAGE LOG</a>
        <a class="chapter-page-btn" id="ch-next">
          NEXT CHAPTER
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </nav>
    </div>
  </main>

  <script src="chapters-data.js"></script>
  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var chNum   = parseInt(params.get('ch'), 10);
      var chapters = window.CGC_CHAPTERS || [];
      var chapter  = chapters.find(function (c) { return c.num === chNum; });

      var elLoading = document.getElementById('chapter-loading');
      var elError   = document.getElementById('chapter-error');
      var elContent = document.getElementById('chapter-content');

      if (!chapter) {
        elLoading.style.display = 'none';
        elError.style.display   = 'flex';
        return;
      }

      // Pad number
      var pad = chNum < 10 ? '0' + chNum : String(chNum);

      document.title = 'CH.' + pad + ' — ' + chapter.title + ' | Captain Guido';
      document.getElementById('ch-num-label').textContent  = 'CH.' + pad + ' — CHAPTER ' + chNum + ' OF ' + chapters.length;
      document.getElementById('ch-title').textContent      = chapter.title;
      document.getElementById('ch-location').textContent   = chapter.location;
      document.getElementById('ch-setting').textContent    = 'SETTING: ' + chapter.setting.toUpperCase();
      document.getElementById('ch-body').innerHTML         = chapter.body;

      // Prev / Next buttons
      var prevCh = chapters.find(function (c) { return c.num === chNum - 1; });
      var nextCh = chapters.find(function (c) { return c.num === chNum + 1; });
      var elPrev = document.getElementById('ch-prev');
      var elNext = document.getElementById('ch-next');

      if (prevCh) {
        elPrev.href = 'chapter.html?ch=' + prevCh.num;
      } else {
        elPrev.setAttribute('disabled', 'true');
        elPrev.removeAttribute('href');
      }

      if (nextCh) {
        elNext.href = 'chapter.html?ch=' + nextCh.num;
      } else {
        elNext.setAttribute('disabled', 'true');
        elNext.removeAttribute('href');
      }

      elLoading.style.display = 'none';
      elContent.style.display = 'block';
    })();
  </script>
</body>
</html>
